<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="faceFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B1A"/>
      <stop offset="100%" stop-color="#E85000"/>
    </linearGradient>
    <linearGradient id="faceTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9A5C"/>
      <stop offset="100%" stop-color="#FF6B1A"/>
    </linearGradient>
    <linearGradient id="faceRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C44000"/>
      <stop offset="100%" stop-color="#8B2D00"/>
    </linearGradient>
  </defs>

  <!-- Isometric cube – three visible faces -->
  <!-- Front face (bottom-left) -->
  <polygon points="8,32 32,46 32,62 8,48" fill="url(#faceFront)"/>
  <!-- Top face -->
  <polygon points="8,32 32,18 56,32 32,46" fill="url(#faceTop)"/>
  <!-- Right face (bottom-right) -->
  <polygon points="32,46 56,32 56,48 32,62" fill="url(#faceRight)"/>

  <!-- Subtle inner edge lines for depth -->
  <line x1="32" y1="18" x2="32" y2="46" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.25"/>
  <line x1="8" y1="32" x2="32" y2="46" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.15"/>
  <line x1="56" y1="32" x2="32" y2="46" stroke="#000000" stroke-width="0.6" stroke-opacity="0.15"/>

  <!-- Outer stroke for crispness -->
  <polygon points="8,32 32,18 56,32 32,46" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.3"/>
  <polygon points="8,32 32,46 32,62 8,48" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>
  <polygon points="32,46 56,32 56,48 32,62" fill="none" stroke="#000000" stroke-width="0.5" stroke-opacity="0.2"/>
</svg>
